services:
  - type: web
    name: accuracy-profile-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    branch: main
    plan: starter
    region: oregon
    envVars:
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://your-app.com,http://localhost:3000"
      - key: HOST
        value: "0.0.0.0"
      # Render fournit automatiquement la variable PORT.
